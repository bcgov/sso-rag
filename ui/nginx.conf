server {
    listen 8080;
    server_name _;

    # Serve static React build.
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /query and /health to the FastAPI backend.
    # API_URL is substituted at container start by docker-entrypoint.sh.
    location ~ ^/(query|health) {
        proxy_pass API_URL_PLACEHOLDER;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for SSE streaming — disable nginx buffering.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    # SPA fallback: unknown routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
